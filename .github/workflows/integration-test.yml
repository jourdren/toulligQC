name: "Integration Test"

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

jobs:
  integration-test:
    name: Run ToulligQC integration test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --dev

      - name: Run unit tests
        run: uv run pytest

      - name: Run ToulligQC
        run: |
          mkdir -p /tmp/toulligqc_output
          uv run toulligqc \
            --sequencing-summary-source test_data/integration/sequencing_summary.txt.gz \
            --data-report-path /tmp/toulligqc_output/report.data \
            --output-directory /tmp/toulligqc_output

      - name: Compare report.data against expected values
        run: |
          uv run python test/toulligqc-compare-reports.py \
            /tmp/toulligqc_output/*/report.data \
            test_data/integration/report.data.expected
